services:
  # Backend: FastAPI Web Service
  - type: web
    name: gleyforgym-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gleyforgym-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: CLOUDINARY_URL
        sync: false # Set manually in Render dashboard
      - key: CORS_ORIGINS
        value: "*" # Custom CORS configuration

  # Frontend: React Static Site
  - type: web
    name: gleyforgym-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    rootDir: web-admin
    plan: free
    routes:
      # Rewrite rule to route all frontend paths to index.html (SPA routing support)
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: gleyforgym-backend
          property: url

databases:
  # Managed PostgreSQL Database
  - name: gleyforgym-db
    databaseName: gleyforgym
    user: postgres
    plan: free
